events {
    worker_connections 1024;
}

http {
    # ─── Rate Limiting Zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=50r/s;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m   rate=5r/s;

    # ─── Upstream Services ────────────────────────────────────────────────────
    upstream auth_service {
        server auth-service:8001;
        keepalive 32;
    }

    upstream inventory_service {
        server inventory-service:8002;
        keepalive 32;
    }

    upstream billing_service {
        server billing-service:8003;
        keepalive 32;
    }

    upstream crm_service {
        server crm-service:8004;
        keepalive 32;
    }

    upstream ai_service {
        server ai-service:8005;
        keepalive 32;
    }

    upstream notification_service {
        server notification-service:8006;
        keepalive 32;
    }

    # ─── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$upstream_addr" ${request_time}s';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Main Server ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 20M;

        # ─── Auth Service ─────────────────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            rewrite ^/api/auth/(.*) /$1 break;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ─── Inventory Service ────────────────────────────────────────────────
        location /api/inventory/ {
            limit_req zone=api_limit burst=100 nodelay;
            rewrite ^/api/inventory/(.*) /$1 break;
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ─── Billing Service ──────────────────────────────────────────────────
        location /api/billing/ {
            limit_req zone=api_limit burst=100 nodelay;
            rewrite ^/api/billing/(.*) /$1 break;
            proxy_pass http://billing_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;  # PDF generation can be slow
        }

        # ─── CRM Service ──────────────────────────────────────────────────────
        location /api/crm/ {
            limit_req zone=api_limit burst=100 nodelay;
            rewrite ^/api/crm/(.*) /$1 break;
            proxy_pass http://crm_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ─── AI Service ───────────────────────────────────────────────────────
        location /api/ai/ {
            limit_req zone=ai_limit burst=10 nodelay;
            rewrite ^/api/ai/(.*) /$1 break;
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;  # AI agents need longer timeouts
        }

        # ─── Notification Service ─────────────────────────────────────────────
        location /api/notifications/ {
            limit_req zone=api_limit burst=50 nodelay;
            rewrite ^/api/notifications/(.*) /$1 break;
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ─── Health Check ─────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # Block internal endpoints from public access
        location ~ ^/(internal|/api/.*/internal) {
            return 403;
        }

        # Default — 404
        location / {
            return 404 '{"detail":"Route not found. Use /api/<service>/<endpoint>"}';
            add_header Content-Type application/json;
        }
    }
}
